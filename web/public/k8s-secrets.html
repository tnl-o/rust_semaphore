<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Secrets — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        .data-preview {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
        }
        .key-badge {
            display: inline-block;
            background: #f8d7da;
            color: #721c24;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
        }
        .secret-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            background: #e2e3e5;
            color: #383d44;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
        <div class="main-header">
            <h2><i class="fa-solid fa-user-secret"></i> Kubernetes Secrets</h2>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="fa-solid fa-plus"></i> Создать
                </button>
                <button class="btn btn-secondary" onclick="loadSecrets()">
                    <i class="fa-solid fa-rotate"></i> Обновить
                </button>
            </div>
        </div>
        <div class="main-body">
            <div class="card" style="margin-bottom: 12px;">
                <i class="fa-solid fa-circle-info"></i>
                Для production-паттерна хранения секретов см. External Secrets:
                <a href="https://external-secrets.io/latest/" target="_blank" rel="noopener noreferrer">external-secrets.io</a>.
                Интеграция в Velum остаётся опциональной.
            </div>
            <!-- Фильтры -->
            <div class="card" style="margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <label>Namespace:
                    <select id="namespace" class="form-control" style="max-width: 200px;" onchange="loadSecrets()"></select>
                </label>
                <input id="filter" class="form-control" placeholder="Фильтр по имени" style="min-width: 200px;" onkeyup="filterSecrets()">
                <label>
                    <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()"> Автообновление
                </label>
            </div>

            <!-- Таблица Secrets -->
            <div id="content" class="card">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create/Update Modal -->
<div id="create-modal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <h3><i class="fa-solid fa-plus"></i> Создать Secret</h3>
        <form onsubmit="createSecret(event)">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="secret-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Namespace *</label>
                <select id="secret-namespace" class="form-control" required></select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="secret-type" class="form-control">
                    <option value="Opaque">Opaque</option>
                    <option value="kubernetes.io/tls">TLS Secret</option>
                    <option value="kubernetes.io/dockerconfigjson">Docker Registry</option>
                    <option value="kubernetes.io/basic-auth">Basic Auth</option>
                    <option value="kubernetes.io/ssh-auth">SSH Auth</option>
                </select>
            </div>
            <div class="form-group">
                <label>Data (JSON формат)</label>
                <div style="font-size: 12px; color: #666; margin-bottom: 8px;">
                    Значения будут автоматически закодированы в base64
                </div>
                <textarea id="secret-data" class="form-control" rows="10" style="font-family: monospace;" placeholder='{"username": "admin", "password": "secret123"}'></textarea>
            </div>
            <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">Отмена</button>
                <button type="submit" class="btn btn-primary">Создать</button>
            </div>
        </form>
    </div>
</div>

<!-- Details Modal -->
<div id="details-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
        <h3><i class="fa-solid fa-user-secret"></i> Secret: <span id="details-name"></span></h3>
        <div id="details-content"></div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px;">
            <button class="btn btn-primary" onclick="revealSecret()">
                <i class="fa-solid fa-eye"></i> Показать значения
            </button>
            <button class="btn btn-secondary" onclick="closeDetailsModal()">Закрыть</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
checkAuth();
let secretsData = [];
let autoRefreshInterval = null;
let currentSecret = null;

// Загрузка namespaces
async function loadNamespaces() {
    try {
        const ns = await api.get('/kubernetes/namespaces');
        const select = $('#namespace');
        const secretSelect = $('#secret-namespace');
        const options = '<option value="default">default</option>' + ns.map(n => `<option value="${escapeHtml(n.name)}">${escapeHtml(n.name)}</option>`).join('');
        select.innerHTML = options;
        secretSelect.innerHTML = options;
        loadSecrets();
    } catch (e) {
        console.error('Failed to load namespaces:', e);
        $('#content').innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-exclamation-triangle"></i> Ошибка: ${escapeHtml(e.message)}</div>`;
    }
}

// Загрузка Secrets
async function loadSecrets() {
    const namespace = $('#namespace').value;
    const content = $('#content');

    content.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div>';

    try {
        secretsData = await api.get(`/kubernetes/namespaces/${namespace}/secrets`);
        renderSecrets(secretsData);
        updateLastUpdate();
    } catch (e) {
        console.error('Failed to load secrets:', e);
        content.innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-exclamation-triangle"></i> Ошибка: ${escapeHtml(e.message)}</div>`;
    }
}

// Рендер Secrets
function renderSecrets(secrets) {
    const content = $('#content');
    const filter = $('#filter').value.toLowerCase();

    let filtered = secrets;
    if (filter) {
        filtered = secrets.filter(s => s.name.toLowerCase().includes(filter));
    }

    if (filtered.length === 0) {
        content.innerHTML = '<div class="alert alert-info"><i class="fa-solid fa-info-circle"></i> Secrets не найдено</div>';
        return;
    }

    content.innerHTML = `
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Namespace</th>
                    <th>Type</th>
                    <th>Keys</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(secret => `
                    <tr>
                        <td><strong>${escapeHtml(secret.name)}</strong></td>
                        <td>${escapeHtml(secret.namespace)}</td>
                        <td><span class="secret-type">${escapeHtml(secret.type || 'Opaque')}</span></td>
                        <td>
                            ${secret.keys && secret.keys.length ? secret.keys.map(k => `<span class="key-badge">${escapeHtml(k)}</span>`).join('') : '<span style="color:#999">—</span>'}
                        </td>
                        <td>${escapeHtml(secret.age || 'N/A')}</td>
                        <td style="display: flex; gap: 4px;">
                            <button class="btn btn-sm btn-secondary" onclick="showDetails('${escapeHtml(secret.name)}', '${escapeHtml(secret.namespace)}')" title="View">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSecret('${escapeHtml(secret.name)}', '${escapeHtml(secret.namespace)}')" title="Delete">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

// Фильтр
function filterSecrets() {
    renderSecrets(secretsData);
}

// Показать детали
async function showDetails(name, namespace) {
    try {
        const data = await api.get(`/kubernetes/namespaces/${namespace}/secrets/${name}`);
        currentSecret = { name, namespace, data };
        
        $('#details-name').textContent = `${namespace}/${name}`;
        
        const dataKeys = data.data ? Object.keys(data.data) : [];
        
        let dataHtml = '';
        if (dataKeys.length > 0) {
            dataHtml += `<h4>Data (base64 encoded)</h4><div class="data-preview">${escapeHtml(JSON.stringify(data.data, null, 2))}</div>`;
            dataHtml += `<div style="margin-top: 12px; color: #666; font-size: 12px;">
                <i class="fa-solid fa-lock"></i> Данные закодированы в base64. Нажмите "Показать значения" для расшифровки.
            </div>`;
        }
        
        $('#details-content').innerHTML = `
            <div class="card">
                <table class="table">
                    <tr><td>Name</td><td>${escapeHtml(data.name)}</td></tr>
                    <tr><td>Namespace</td><td>${escapeHtml(data.namespace)}</td></tr>
                    <tr><td>Type</td><td><span class="secret-type">${escapeHtml(data.type || 'Opaque')}</span></td></tr>
                    <tr><td>Data keys</td><td>${dataKeys.length}</td></tr>
                    <tr><td>Created</td><td>${data.created_at ? new Date(data.created_at).toLocaleString() : 'N/A'}</td></tr>
                </table>
                ${dataHtml}
            </div>
        `;
        $('#details-modal').classList.add('active');
    } catch (e) {
        alert(`Ошибка: ${e.message}`);
    }
}

// Показать значения (reveal)
async function revealSecret() {
    if (!currentSecret) return;
    
    const { name, namespace, data } = currentSecret;
    
    try {
        // Получаем расшифрованные значения через API
        const revealed = await api.get(`/kubernetes/namespaces/${namespace}/secrets/${name}/reveal`);
        
        let revealedHtml = '';
        if (revealed.data) {
            revealedHtml = `<h4>Data (decoded)</h4><div class="data-preview" style="background: #d4edda; color: #155724;">${escapeHtml(JSON.stringify(revealed.data, null, 2))}</div>`;
        }
        
        document.getElementById('details-content').insertAdjacentHTML('beforeend', revealedHtml);
    } catch (e) {
        // Если API reveal недоступен, декодируем base64 на клиенте
        if (data.data) {
            const decoded = {};
            for (const [key, value] of Object.entries(data.data)) {
                try {
                    decoded[key] = atob(value);
                } catch (err) {
                    decoded[key] = `<error decoding: ${err.message}>`;
                }
            }
            const revealedHtml = `<h4>Data (decoded)</h4><div class="data-preview" style="background: #d4edda; color: #155724;">${escapeHtml(JSON.stringify(decoded, null, 2))}</div>`;
            document.getElementById('details-content').insertAdjacentHTML('beforeend', revealedHtml);
        }
    }
}

// Create Secret
async function createSecret(event) {
    event.preventDefault();
    
    const name = $('#secret-name').value;
    const namespace = $('#secret-namespace').value;
    const type = $('#secret-type').value;
    let dataValue = {};
    
    try {
        const dataStr = $('#secret-data').value.trim();
        if (dataStr) {
            dataValue = JSON.parse(dataStr);
        }
    } catch (e) {
        alert(`Invalid JSON: ${e.message}`);
        return;
    }
    
    try {
        await api.post('/kubernetes/secrets', {
            name,
            namespace,
            type,
            data: dataValue
        });
        alert(`Secret ${namespace}/${name} создан`);
        closeCreateModal();
        loadSecrets();
    } catch (e) {
        alert(`Ошибка: ${e.message}`);
    }
}

// Delete Secret
async function deleteSecret(name, namespace) {
    if (!confirm(`Удалить Secret ${namespace}/${name}? Это действие нельзя отменить!`)) return;
    
    try {
        await api.delete(`/kubernetes/namespaces/${namespace}/secrets/${name}`);
        alert(`Secret ${namespace}/${name} удалён`);
        loadSecrets();
    } catch (e) {
        alert(`Ошибка: ${e.message}`);
    }
}

// Modal functions
function openCreateModal() {
    currentSecret = null;
    $('#secret-name').value = '';
    $('#secret-data').value = '';
    document.querySelector('#create-modal h3').innerHTML = '<i class="fa-solid fa-plus"></i> Создать Secret';
    $('#create-modal').classList.add('active');
}

function closeCreateModal() {
    $('#create-modal').classList.remove('active');
}

function closeDetailsModal() {
    $('#details-modal').classList.remove('active');
    currentSecret = null;
}

// Auto Refresh
function toggleAutoRefresh() {
    if ($('#auto-refresh').checked) {
        autoRefreshInterval = setInterval(loadSecrets, 10000);
    } else {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    }
}

function updateLastUpdate() {
    const now = new Date();
    const el = document.getElementById('last-update');
    if (el) el.textContent = 'Обновлено: ' + now.toLocaleTimeString();
}

// Init
loadNamespaces();
</script>
</body>
</html>
