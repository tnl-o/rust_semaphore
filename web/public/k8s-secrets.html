<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Secrets - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
<div class="layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
        <div class="main-header"><h2><i class="fa-solid fa-user-secret"></i> Kubernetes Secrets</h2></div>
        <div class="main-body">
            <div class="card" style="margin-bottom: 12px; display: flex; gap: 8px; align-items: center;">
                <select id="namespace" class="form-control" style="max-width: 260px;"></select>
                <input id="filter" class="form-control" placeholder="Фильтр по имени/типу">
                <button class="btn btn-primary" onclick="loadSecrets()"><i class="fa-solid fa-rotate"></i> Обновить</button>
            </div>
            <div id="content" class="card"><div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div></div>
        </div>
    </div>
</div>
<script src="app.js"></script>
<script>
checkAuth();
const KEY = 'k8s_namespace';
const content = $('#content');

async function loadNamespaces() {
    const data = await api.get('/kubernetes/namespaces');
    const sel = $('#namespace');
    const names = (data || []).map(n => n.name).filter(Boolean);
    const current = localStorage.getItem(KEY) || names[0] || 'default';
    sel.innerHTML = names.map(n => `<option value="${escapeHtml(n)}"${n===current?' selected':''}>${escapeHtml(n)}</option>`).join('');
    sel.addEventListener('change', () => { localStorage.setItem(KEY, sel.value); loadSecrets(); });
}

async function loadSecrets() {
    const ns = $('#namespace').value || localStorage.getItem(KEY) || 'default';
    const filter = ($('#filter').value || '').toLowerCase();
    const rows = await api.get(`/kubernetes/secrets?namespace=${encodeURIComponent(ns)}`);
    const filtered = (rows || []).filter(x => (x.name || '').toLowerCase().includes(filter) || (x.type || '').toLowerCase().includes(filter));
    content.innerHTML = `
        <table class="table">
            <thead><tr><th>Имя</th><th>Тип</th><th>Ключей</th><th></th></tr></thead>
            <tbody>
                ${filtered.map(s => `<tr>
                    <td>${escapeHtml(s.name || '—')}</td>
                    <td><span class="badge badge-warning">${escapeHtml(s.type || 'Opaque')}</span></td>
                    <td>${s.keys_count || 0}</td>
                    <td>
                        <button class="btn btn-sm" onclick="showMasked('${encodeURIComponent(s.name)}')"><i class="fa-solid fa-eye-slash"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="showReveal('${encodeURIComponent(s.name)}')"><i class="fa-solid fa-eye"></i></button>
                    </td>
                </tr>`).join('')}
            </tbody>
        </table>`;
}

async function showMasked(nameEnc) {
    const ns = $('#namespace').value || 'default';
    const data = await api.get(`/kubernetes/namespaces/${encodeURIComponent(ns)}/secrets/${nameEnc}`);
    ui.showModal('Secret (masked)', `<pre style="white-space: pre-wrap;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`);
}

async function showReveal(nameEnc) {
    if (!confirm('Раскрыть значения секрета?')) return;
    const ns = $('#namespace').value || 'default';
    const data = await api.get(`/kubernetes/namespaces/${encodeURIComponent(ns)}/secrets/${nameEnc}/reveal`);
    ui.showModal('Secret (revealed)', `<pre style="white-space: pre-wrap;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`);
}

$('#filter').addEventListener('input', () => loadSecrets());
(async function init(){ await loadNamespaces(); await loadSecrets(); })();
</script>
</body>
</html>
