<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2>Проекты</h2>
                <button class="btn btn-primary" onclick="openProjectModal()">
                    <i class="fa-solid fa-plus"></i> Новый проект
                </button>
            </div>

            <div class="main-body">
                <p style="color:var(--text-light); margin-bottom:20px;">Выберите проект или создайте новый</p>
                <div id="projects-grid" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        function loadProjects() {
            api.getProjects()
                .then(projects => {
                    const grid = $('#projects-grid');
                    if (projects.length === 0) {
                        ui.showEmpty(grid, '<i class="fa-solid fa-folder-open fa-2x"></i>', 'Нет проектов', 'Создайте первый проект чтобы начать работу');
                    } else {
                        grid.innerHTML = projects.map(p => `
                            <div class="card card-interactive" onclick="selectProject(${p.id})">
                                <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                                    <div style="width:40px;height:40px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                        <i class="fa-solid fa-folder" style="color:#fff;font-size:18px;"></i>
                                    </div>
                                    <div style="min-width:0;">
                                        <div style="font-weight:600;color:var(--text);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(p.name)}</div>
                                        <div style="font-size:12px;color:var(--text-light);">ID: ${p.id}</div>
                                    </div>
                                </div>
                                <p style="font-size:13px;color:var(--text-light);line-height:1.5;margin:0;">${escapeHtml(p.description || 'Нет описания')}</p>
                            </div>
                        `).join('');
                    }
                })
                .catch(error => {
                    ui.showError($('#projects-grid'), error.message);
                });
        }

        function selectProject(id) {
            localStorage.setItem('velum_project_id', id);
            window.location.href = '/project.html?id=' + id;
        }

        loadProjects();

        function openProjectModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'project-modal';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h2><i class="fa-solid fa-folder-plus"></i> Новый проект</h2>
                    </div>
                    <form id="project-form">
                        <div class="form-group">
                            <label for="project-name">Название *</label>
                            <input type="text" id="project-name" class="form-control" required placeholder="My Project" autofocus>
                        </div>
                        <div class="form-group">
                            <label for="project-description">Описание</label>
                            <textarea id="project-description" class="form-control" rows="2" placeholder="Краткое описание..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="project-parallel">Макс. параллельных задач</label>
                            <input type="number" id="project-parallel" class="form-control" value="0" min="0">
                            <small style="color:var(--text-light);">0 — без ограничений</small>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn" onclick="closeProjectModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">Создать проект</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            $('#project-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = $('#project-name').value.trim();
                if (!name) { ui.showAlert('Введите название', 'warning'); return; }
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.textContent = 'Создание...';
                api.createProject({
                    name,
                    description: $('#project-description').value.trim() || null,
                    max_parallel_tasks: parseInt($('#project-parallel').value) || 0
                })
                .then(p => {
                    closeProjectModal();
                    selectProject(p.id);
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                    btn.disabled = false;
                    btn.textContent = 'Создать проект';
                });
            });

            modal.addEventListener('click', (e) => { if (e.target === modal) closeProjectModal(); });
        }

        function closeProjectModal() {
            const m = $('#project-modal');
            if (m) m.remove();
        }
    </script>
</body>
</html>
