<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Metrics — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
<div class="layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
        <div class="main-header">
            <h2><i class="fa-solid fa-chart-line"></i> Kubernetes Metrics</h2>
            <a href="k8s-troubleshoot.html" class="btn btn-secondary">
                <i class="fa-solid fa-stethoscope"></i> Troubleshoot
            </a>
        </div>
        <div class="main-body">
            <div class="card" style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <select id="tab" class="form-control" style="max-width:200px;">
                    <option value="top-pods">Top Pods</option>
                    <option value="top-nodes">Top Nodes</option>
                    <option value="pod-metrics">Pod Metrics</option>
                    <option value="node-metrics">Node Metrics</option>
                </select>
                <label>Namespace: <select id="namespace" class="form-control" style="max-width:200px;"></select></label>
                <input id="filter" class="form-control" placeholder="Фильтр по имени" style="min-width:160px;">
                <button class="btn btn-primary" onclick="loadMetrics()"><i class="fa-solid fa-rotate"></i> Обновить</button>
            </div>
            <div id="info-banner" class="alert alert-info" style="display:none;margin-bottom:12px;">
                <i class="fa-solid fa-circle-info"></i> 
                Для работы Metrics API требуется установленный <strong>metrics-server</strong> в кластере.
            </div>
            <div id="content" class="card"><div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
checkAuth();
let metricsData = null;

async function loadNamespaces() {
    try {
        const ns = await api.get('/kubernetes/namespaces');
        const select = $('#namespace');
        select.innerHTML = '<option value="">— все —</option>';
        ns.forEach(n => {
            select.innerHTML += `<option value="${escapeHtml(n.name)}">${escapeHtml(n.name)}</option>`;
        });
    } catch (e) {
        $('#info-banner').style.display = 'block';
    }
}

async function loadMetrics() {
    const tab = $('#tab').value;
    const ns = $('#namespace').value || 'default';
    const filter = $('#filter').value.toLowerCase();
    const content = $('#content');
    
    try {
        let data;
        if (tab === 'top-pods') {
            data = await api.get(`/kubernetes/metrics/top/pods?namespace=${ns}`);
            metricsData = data.pods || [];
            renderTopPods(metricsData, filter, content);
        } else if (tab === 'top-nodes') {
            data = await api.get('/kubernetes/metrics/top/nodes');
            metricsData = data || [];
            renderTopNodes(metricsData, filter, content);
        } else if (tab === 'pod-metrics') {
            data = await api.get(`/kubernetes/metrics/pods?namespace=${ns}`);
            metricsData = data || [];
            renderPodMetrics(metricsData, filter, content);
        } else if (tab === 'node-metrics') {
            data = await api.get('/kubernetes/metrics/nodes');
            metricsData = data || [];
            renderNodeMetrics(metricsData, filter, content);
        }
    } catch (e) {
        $('#info-banner').style.display = 'block';
        ui.showError(content, 'Metrics API недоступен. Убедитесь, что metrics-server установлен: ' + e.message);
    }
}

function renderTopPods(pods, filter, content) {
    const filtered = pods.filter(p => !filter || p.name.toLowerCase().includes(filter) || p.namespace.toLowerCase().includes(filter));
    
    if (filtered.length === 0) {
        ui.showEmpty(content, '<i class="fa-solid fa-chart-line"></i>', 'Нет данных', 'Pod metrics недоступны');
        return;
    }
    
    content.innerHTML = `
        <table class="table">
            <thead>
                <tr>
                    <th>Pod</th>
                    <th>Namespace</th>
                    <th>CPU Usage</th>
                    <th>Memory Usage</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(pod => `
                    <tr>
                        <td><strong>${escapeHtml(pod.name)}</strong></td>
                        <td>${escapeHtml(pod.namespace)}</td>
                        <td><i class="fa-solid fa-microchip"></i> ${escapeHtml(pod.cpu_usage)}</td>
                        <td><i class="fa-solid fa-memory"></i> ${escapeHtml(pod.memory_usage)}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function renderTopNodes(nodes, filter, content) {
    const filtered = nodes.filter(n => !filter || n.name.toLowerCase().includes(filter));
    
    if (filtered.length === 0) {
        ui.showEmpty(content, '<i class="fa-solid fa-server"></i>', 'Нет данных', 'Node metrics недоступны');
        return;
    }
    
    content.innerHTML = `
        <table class="table">
            <thead>
                <tr>
                    <th>Node</th>
                    <th>CPU Usage</th>
                    <th>Memory Usage</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(node => `
                    <tr>
                        <td><strong>${escapeHtml(node.name)}</strong></td>
                        <td><i class="fa-solid fa-microchip"></i> ${escapeHtml(node.usage.cpu)}</td>
                        <td><i class="fa-solid fa-memory"></i> ${escapeHtml(node.usage.memory)}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function renderPodMetrics(metrics, filter, content) {
    const filtered = metrics.filter(m => !filter || m.name.toLowerCase().includes(filter));
    
    if (filtered.length === 0) {
        ui.showEmpty(content, '<i class="fa-solid fa-box"></i>', 'Нет данных', 'Pod metrics недоступны');
        return;
    }
    
    content.innerHTML = `
        <table class="table">
            <thead>
                <tr>
                    <th>Pod</th>
                    <th>Namespace</th>
                    <th>Containers</th>
                    <th>Timestamp</th>
                    <th>Window</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(m => `
                    <tr>
                        <td><strong>${escapeHtml(m.name)}</strong></td>
                        <td>${escapeHtml(m.namespace)}</td>
                        <td>${m.containers.length} container(s)</td>
                        <td>${formatDate(m.timestamp)}</td>
                        <td>${m.window}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function renderNodeMetrics(metrics, filter, content) {
    const filtered = metrics.filter(m => !filter || m.name.toLowerCase().includes(filter));
    
    if (filtered.length === 0) {
        ui.showEmpty(content, '<i class="fa-solid fa-server"></i>', 'Нет данных', 'Node metrics недоступны');
        return;
    }
    
    content.innerHTML = `
        <table class="table">
            <thead>
                <tr>
                    <th>Node</th>
                    <th>CPU Usage</th>
                    <th>Memory Usage</th>
                    <th>Timestamp</th>
                    <th>Window</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(m => `
                    <tr>
                        <td><strong>${escapeHtml(m.name)}</strong></td>
                        <td><i class="fa-solid fa-microchip"></i> ${escapeHtml(m.usage.cpu)}</td>
                        <td><i class="fa-solid fa-memory"></i> ${escapeHtml(m.usage.memory)}</td>
                        <td>${formatDate(m.timestamp)}</td>
                        <td>${m.window}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

$('#tab').addEventListener('change', loadMetrics);
$('#namespace').addEventListener('change', loadMetrics);
$('#filter').addEventListener('input', loadMetrics);

loadNamespaces().then(loadMetrics);
</script>
</body>
</html>
