<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Helm — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
<div class="layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
        <div class="main-header">
            <h2><i class="fa-solid fa-helmet-safety"></i> Helm Charts & Releases</h2>
            <button class="btn btn-primary" onclick="openInstallModal()"><i class="fa-solid fa-plus"></i> Установить Chart</button>
        </div>
        <div class="main-body">
            <div class="card" style="margin-bottom:12px;">
                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item"><a class="nav-link active" data-tab="releases" href="#">Releases</a></li>
                    <li class="nav-item"><a class="nav-link" data-tab="charts" href="#">Charts Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" data-tab="repos" href="#">Repositories</a></li>
                </ul>
            </div>
            
            <!-- Releases Tab -->
            <div id="releases-tab" class="tab-content active">
                <div class="card" style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <label>Namespace: <select id="release-namespace" class="form-control" style="max-width:200px;"></select></label>
                    <input id="release-filter" class="form-control" placeholder="Фильтр по имени" style="min-width:160px;">
                    <button class="btn btn-primary" onclick="loadReleases()"><i class="fa-solid fa-rotate"></i> Обновить</button>
                </div>
                <div id="releases-content" class="card"><div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div></div>
            </div>
            
            <!-- Charts Tab -->
            <div id="charts-tab" class="tab-content">
                <div class="card" style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input id="chart-search" class="form-control" placeholder="Поиск chart..." style="min-width:300px;">
                    <button class="btn btn-primary" onclick="searchCharts()"><i class="fa-solid fa-magnifying-glass"></i> Поиск</button>
                </div>
                <div id="charts-content" class="card"><div class="loading"><div class="loading-spinner"></div><p>Введите запрос для поиска</p></div></div>
            </div>
            
            <!-- Repos Tab -->
            <div id="repos-tab" class="tab-content">
                <div class="card" style="margin-bottom:12px;">
                    <button class="btn btn-primary" onclick="openAddRepoModal()"><i class="fa-solid fa-plus"></i> Добавить Repository</button>
                </div>
                <div id="repos-content" class="card"><div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div></div>
            </div>
        </div>
    </div>
</div>

<!-- Install Chart Modal -->
<div class="modal-overlay" id="install-modal" style="display:none;">
    <div class="modal" style="max-width:600px;">
        <div class="modal-header">
            <h3>Установить Helm Chart</h3>
            <button class="modal-close" onclick="closeInstallModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <form id="install-form" onsubmit="installChart(event)">
                <div class="form-group">
                    <label>Release Name *</label>
                    <input type="text" id="release-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Namespace *</label>
                    <select id="release-namespace-install" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>Chart *</label>
                    <input type="text" id="chart-name" class="form-control" placeholder="nginx, postgresql, etc." required>
                </div>
                <div class="form-group">
                    <label>Version</label>
                    <input type="text" id="chart-version" class="form-control" placeholder="latest">
                </div>
                <div class="form-group">
                    <label>Repository</label>
                    <input type="text" id="chart-repo" class="form-control" placeholder="bitnami, stable, etc.">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeInstallModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Установить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
checkAuth();

// Tab switching
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tabId = this.dataset.tab + '-tab';
        document.getElementById(tabId).classList.add('active');
        
        if (this.dataset.tab === 'releases') loadReleases();
        if (this.dataset.tab === 'repos') loadRepos();
    });
});

async function loadNamespaces() {
    const ns = await api.get('/kubernetes/namespaces');
    const selects = ['#release-namespace', '#release-namespace-install'];
    selects.forEach(sel => {
        const el = $(sel);
        if (el) {
            el.innerHTML = '<option value="default">default</option>';
            ns.forEach(n => {
                if (n.name !== 'default') el.innerHTML += `<option value="${escapeHtml(n.name)}">${escapeHtml(n.name)}</option>`;
            });
        }
    });
}

async function loadReleases() {
    const ns = $('#release-namespace').value || 'default';
    const filter = $('#release-filter').value.toLowerCase();
    const content = $('#releases-content');
    
    try {
        const data = await api.get(`/kubernetes/helm/releases?namespace=${ns}`);
        let releases = data.releases || [];
        
        if (filter) {
            releases = releases.filter(r => r.name.toLowerCase().includes(filter));
        }
        
        if (releases.length === 0) {
            ui.showEmpty(content, '<i class="fa-solid fa-helmet-safety"></i>', 'Нет releases', 'Установите первый Helm chart');
            return;
        }
        
        content.innerHTML = `
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Namespace</th>
                        <th>Chart</th>
                        <th>Version</th>
                        <th>Status</th>
                        <th>Revision</th>
                        <th>Deployed</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    ${releases.map(r => `
                        <tr>
                            <td><strong>${escapeHtml(r.name)}</strong></td>
                            <td>${escapeHtml(r.namespace)}</td>
                            <td>${escapeHtml(r.chart)}</td>
                            <td>${escapeHtml(r.chart_version)}</td>
                            <td><span class="badge badge-${r.status === 'deployed' ? 'success' : 'secondary'}">${escapeHtml(r.status)}</span></td>
                            <td>${r.revision}</td>
                            <td>${formatDate(r.deployed_at)}</td>
                            <td>
                                <button class="btn btn-sm btn-secondary" onclick="upgradeRelease('${escapeHtml(r.name)}','${escapeHtml(r.namespace)}')" title="Upgrade"><i class="fa-solid fa-arrow-up"></i></button>
                                <button class="btn btn-sm btn-secondary" onclick="rollbackRelease('${escapeHtml(r.name)}','${escapeHtml(r.namespace)}')" title="Rollback"><i class="fa-solid fa-rotate-left"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="uninstallRelease('${escapeHtml(r.name)}','${escapeHtml(r.namespace)}')" title="Uninstall"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        ui.showError(content, e.message);
    }
}

async function searchCharts() {
    const query = $('#chart-search').value;
    const content = $('#charts-content');
    
    if (!query) {
        ui.showEmpty(content, '<i class="fa-solid fa-magnifying-glass"></i>', 'Поиск chart', 'Введите название chart для поиска');
        return;
    }
    
    try {
        const data = await api.get(`/kubernetes/helm/charts?query=${encodeURIComponent(query)}`);
        let charts = data.charts || [];
        
        if (charts.length === 0) {
            ui.showEmpty(content, '<i class="fa-solid fa-box-open"></i>', 'Chart не найдены', 'Попробуйте другой запрос');
            return;
        }
        
        content.innerHTML = `
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
                ${charts.map(c => `
                    <div class="card" style="padding:12px;">
                        <h4 style="margin-bottom:8px;"><i class="fa-solid fa-box"></i> ${escapeHtml(c.name)}</h4>
                        <p style="font-size:0.9rem;color:#666;margin-bottom:8px;">${escapeHtml(c.description || 'No description')}</p>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:0.85rem;">
                            <span class="badge badge-primary">v${escapeHtml(c.version)}</span>
                            ${c.app_version ? `<span class="badge badge-secondary">App: ${escapeHtml(c.app_version)}</span>` : ''}
                        </div>
                        <button class="btn btn-sm btn-primary" style="margin-top:12px;" onclick="installChartFromCatalog('${escapeHtml(c.name)}')"><i class="fa-solid fa-plus"></i> Установить</button>
                    </div>
                `).join('')}
            </div>
        `;
    } catch (e) {
        ui.showError(content, e.message);
    }
}

async function loadRepos() {
    const content = $('#repos-content');
    
    try {
        const data = await api.get('/kubernetes/helm/repos');
        let repos = data.repositories || [];
        
        if (repos.length === 0) {
            ui.showEmpty(content, '<i class="fa-solid fa-server"></i>', 'Нет repositories', 'Добавьте первый Helm repository');
            return;
        }
        
        content.innerHTML = `
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>URL</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    ${repos.map(r => `
                        <tr>
                            <td><strong>${escapeHtml(r.name)}</strong></td>
                            <td><code>${escapeHtml(r.url)}</code></td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="removeRepo('${escapeHtml(r.name)}')"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (e) {
        ui.showError(content, e.message);
    }
}

function openInstallModal() {
    $('#install-modal').style.display = 'flex';
}

function closeInstallModal() {
    $('#install-modal').style.display = 'none';
    $('#install-form').reset();
}

function installChartFromCatalog(chartName) {
    openInstallModal();
    $('#chart-name').value = chartName;
}

async function installChart(e) {
    e.preventDefault();
    
    const payload = {
        name: $('#release-name').value,
        namespace: $('#release-namespace-install').value,
        chart: $('#chart-name').value,
        version: $('#chart-version').value || undefined,
        repo: $('#chart-repo').value || undefined,
    };
    
    const btn = document.querySelector('#install-modal button[type="submit"]');
    btn.disabled = true;
    
    try {
        await api.post('/kubernetes/helm/releases', payload);
        closeInstallModal();
        loadReleases();
        ui.showAlert('Chart установлен', 'success');
    } catch (e) {
        ui.showAlert('Ошибка: ' + e.message, 'danger');
    } finally {
        btn.disabled = false;
    }
}

async function upgradeRelease(name, namespace) {
    const chart = prompt('Введите chart name для upgrade:');
    if (!chart) return;
    
    try {
        await api.put(`/kubernetes/helm/releases/${namespace}/${name}`, { chart });
        loadReleases();
        ui.showAlert('Release upgraded', 'success');
    } catch (e) {
        ui.showAlert('Ошибка: ' + e.message, 'danger');
    }
}

async function rollbackRelease(name, namespace) {
    const revision = prompt('Введите revision для rollback (оставьте пустым для предыдущего):');
    
    try {
        await api.post(`/kubernetes/helm/releases/${namespace}/${name}/rollback${revision ? '?revision=' + revision : ''}`);
        loadReleases();
        ui.showAlert('Release rolled back', 'success');
    } catch (e) {
        ui.showAlert('Ошибка: ' + e.message, 'danger');
    }
}

async function uninstallRelease(name, namespace) {
    if (!confirm(`Удалить release ${namespace}/${name}?`)) return;
    
    try {
        await api.delete(`/kubernetes/helm/releases/${namespace}/${name}`);
        loadReleases();
        ui.showAlert('Release удалён', 'success');
    } catch (e) {
        ui.showAlert('Ошибка: ' + e.message, 'danger');
    }
}

function openAddRepoModal() {
    const url = prompt('Repository URL:');
    if (!url) return;
    const name = prompt('Repository name:');
    if (!name) return;
    
    api.post('/kubernetes/helm/repos', { name, url }).then(() => {
        loadRepos();
        ui.showAlert('Repository добавлен', 'success');
    }).catch(e => ui.showAlert('Ошибка: ' + e.message, 'danger'));
}

function removeRepo(name) {
    if (!confirm(`Удалить repository ${name}?`)) return;
    // Mock - real implementation would delete the repo
    loadRepos();
}

$('#release-namespace').addEventListener('change', loadReleases);
$('#release-filter').addEventListener('input', loadReleases);
$('#chart-search').addEventListener('keypress', e => { if (e.key === 'Enter') searchCharts(); });

loadNamespaces().then(() => {
    loadReleases();
    loadRepos();
});
</script>
</body>
</html>
