<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Организации - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2><i class="fa-solid fa-building"></i> Организации</h2>
                <button class="btn btn-primary" onclick="openOrgModal()">
                    <i class="fa-solid fa-plus"></i> Новая организация
                </button>
            </div>

            <div class="main-body">
                <div id="orgs-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка организаций...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();
        loadOrganizations();

        function loadOrganizations() {
            const container = $('#orgs-content');

            api.get('/organizations')
                .then(orgs => {
                    if (orgs.length === 0) {
                        ui.showEmpty(container, '<i class="fa-solid fa-building"></i>', 'Нет организаций', 'Создайте первую организацию');
                    } else {
                        container.innerHTML = `
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Название</th>
                                        <th>Slug</th>
                                        <th>Описание</th>
                                        <th>Квоты</th>
                                        <th>Статус</th>
                                        <th>Создана</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${orgs.map(org => `
                                        <tr>
                                            <td><strong>${escapeHtml(org.name)}</strong></td>
                                            <td><code>${escapeHtml(org.slug)}</code></td>
                                            <td>${escapeHtml(org.description || '—')}</td>
                                            <td>
                                                <small>
                                                    ${org.quota_max_projects ? `Проекты: ${org.quota_max_projects}<br>` : ''}
                                                    ${org.quota_max_users ? `Пользователи: ${org.quota_max_users}<br>` : ''}
                                                    ${org.quota_max_tasks_per_month ? `Задачи: ${org.quota_max_tasks_per_month}/мес` : '—'}
                                                </small>
                                            </td>
                                            <td>
                                                <span class="badge badge-${org.active ? 'success' : 'secondary'}">
                                                    ${org.active ? 'Активна' : 'Неактивна'}
                                                </span>
                                            </td>
                                            <td>${formatDate(org.created)}</td>
                                            <td>
                                                <button class="btn btn-sm" onclick="editOrg(${org.id})"><i class="fa-solid fa-pen"></i></button>
                                                <button class="btn btn-danger btn-sm" onclick="deleteOrg(${org.id})"><i class="fa-solid fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function editOrg(id) {
            api.get('/organizations/' + id)
                .then(org => openOrgModal(org))
                .catch(error => ui.showAlert('Ошибка: ' + error.message, 'danger'));
        }

        function deleteOrg(id) {
            if (!confirm('Удалить эту организацию? Все проекты будут перемещены в общий пул.')) return;

            api.request('/organizations/' + id, { method: 'DELETE' })
                .then(() => {
                    ui.showAlert('Организация удалена', 'success');
                    loadOrganizations();
                })
                .catch(error => ui.showAlert('Ошибка: ' + error.message, 'danger'));
        }

        function openOrgModal(org) {
            const isEdit = !!org;
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'org-modal';
            overlay.innerHTML = `
                <div class="modal" style="max-width:600px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '<i class="fa-solid fa-pen"></i> Редактирование' : '<i class="fa-solid fa-plus"></i> Новая организация'}</h2>
                    </div>
                    <form id="org-form">
                        <div class="form-group">
                            <label for="org-name">Название *</label>
                            <input id="org-name" type="text" class="form-control" required
                                   value="${escapeHtml(org?.name || '')}" placeholder="My Company">
                        </div>
                        <div class="form-group">
                            <label for="org-slug">Slug (уникальный идентификатор)</label>
                            <input id="org-slug" type="text" class="form-control"
                                   value="${escapeHtml(org?.slug || '')}" placeholder="my-company">
                            <p class="form-hint">Генерируется автоматически из названия</p>
                        </div>
                        <div class="form-group">
                            <label for="org-description">Описание</label>
                            <textarea id="org-description" class="form-control" rows="3"
                                      placeholder="Описание организации">${escapeHtml(org?.description || '')}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Квоты</label>
                            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                                <div>
                                    <label for="quota-projects" style="font-size:13px;">Макс. проектов</label>
                                    <input id="quota-projects" type="number" class="form-control" min="0"
                                           value="${org?.quota_max_projects || ''}" placeholder="10">
                                </div>
                                <div>
                                    <label for="quota-users" style="font-size:13px;">Макс. пользователей</label>
                                    <input id="quota-users" type="number" class="form-control" min="0"
                                           value="${org?.quota_max_users || ''}" placeholder="50">
                                </div>
                                <div>
                                    <label for="quota-tasks" style="font-size:13px;">Задач/мес</label>
                                    <input id="quota-tasks" type="number" class="form-control" min="0"
                                           value="${org?.quota_max_tasks_per_month || ''}" placeholder="1000">
                                </div>
                            </div>
                        </div>
                        ${isEdit ? `
                        <div class="form-group">
                            <label style="display:flex;align-items:center;gap:8px;">
                                <input type="checkbox" id="org-active" ${org?.active ? 'checked' : ''}>
                                Активна
                            </label>
                        </div>
                        ` : ''}
                        <div class="modal-footer">
                            <button type="button" class="btn" onclick="closeOrgModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('org-form').addEventListener('submit', function(e) {
                e.preventDefault();
                saveOrg(org?.id || null);
            });

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeOrgModal();
            });
        }

        function closeOrgModal() {
            const modal = $('#org-modal');
            if (modal) modal.remove();
        }

        function saveOrg(id) {
            const payload = {
                name: $('#org-name').value.trim(),
                slug: $('#org-slug').value.trim() || null,
                description: $('#org-description').value.trim() || null,
                quota_max_projects: parseInt($('#quota-projects').value) || null,
                quota_max_users: parseInt($('#quota-users').value) || null,
                quota_max_tasks_per_month: parseInt($('#quota-tasks').value) || null,
            };

            if (!payload.name) {
                ui.showAlert('Введите название', 'warning');
                return;
            }

            const btn = document.querySelector('#org-modal button[type="submit"]');
            btn.disabled = true;

            const url = id ? '/organizations/' + id : '/organizations';
            const method = id ? 'PUT' : 'POST';

            api.request(url, { method, body: JSON.stringify(payload) })
                .then(() => {
                    closeOrgModal();
                    ui.showAlert(`Организация ${id ? 'обновлена' : 'создана'}`, 'success');
                    loadOrganizations();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
