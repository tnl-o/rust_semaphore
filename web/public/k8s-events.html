<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Events — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        .k8s-icon { color: #326ce5; font-size: 22px; }
        .event-type { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600; }
        .event-normal  { background:#e8f5e9;color:#2e7d32; }
        .event-warning { background:#fff3e0;color:#e65100; }
        .event-count { font-size:12px;color:var(--text-light); }
        .event-count.many { color:#c62828;font-weight:600; }
        .event-msg { max-width:420px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text); }
        .kind-badge { display:inline-block;padding:1px 8px;background:#f3f4f6;border:1px solid var(--border);border-radius:6px;font-size:11px; }
        .toolbar { display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px; }
    </style>
</head>
<body>
<div class="layout">
    <nav class="sidebar"></nav>
    <main class="main-content">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:10px">
                <i class="fa-solid fa-bell k8s-icon"></i>
                <div>
                    <h1 class="page-title">Events</h1>
                    <p class="page-subtitle">Kubernetes — события в namespace</p>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <select class="form-control" id="clusterSelect" style="min-width:180px"><option value="">— Кластер —</option></select>
            <select class="form-control" id="namespaceSelect" style="min-width:180px" disabled><option value="">— Namespace —</option></select>
            <select class="form-control" id="typeFilter" style="min-width:120px" disabled>
                <option value="">Все типы</option>
                <option value="Warning">Warning</option>
                <option value="Normal">Normal</option>
            </select>
            <select class="form-control" id="kindFilter" style="min-width:130px" disabled>
                <option value="">Все объекты</option>
                <option value="Pod">Pod</option>
                <option value="Deployment">Deployment</option>
                <option value="ReplicaSet">ReplicaSet</option>
                <option value="StatefulSet">StatefulSet</option>
                <option value="DaemonSet">DaemonSet</option>
                <option value="Node">Node</option>
            </select>
            <input type="text" class="form-control" id="filter" placeholder="Фильтр по объекту/причине…" style="flex:1;min-width:160px" disabled>
            <button class="btn btn-secondary" id="refreshBtn" disabled><i class="fa-solid fa-rotate-right"></i> Обновить</button>
        </div>

        <div id="stateNotConfigured" class="empty-state" style="display:none">
            <i class="fa-solid fa-dharmachakra" style="font-size:48px;color:#326ce5;opacity:.4;margin-bottom:12px"></i><p>Kubernetes не сконфигурирован.</p>
        </div>
        <div id="stateSelectCluster" class="empty-state" style="display:none">
            <i class="fa-solid fa-circle-info" style="font-size:36px;color:#aaa;margin-bottom:10px"></i><p>Выберите кластер и namespace.</p>
        </div>
        <div id="stateLoading" class="empty-state" style="display:none">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size:36px;color:#aaa;margin-bottom:10px"></i><p>Загрузка…</p>
        </div>
        <div id="stateForbidden" class="empty-state" style="display:none">
            <i class="fa-solid fa-ban" style="font-size:36px;color:#c62828;opacity:.5;margin-bottom:10px"></i><p>Нет прав на просмотр событий.</p>
        </div>
        <div id="stateError" class="empty-state" style="display:none">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:36px;color:#f57f17;opacity:.6;margin-bottom:10px"></i><p id="stateErrorMsg">Ошибка.</p>
        </div>
        <div id="stateEmpty" class="empty-state" style="display:none">
            <i class="fa-solid fa-bell-slash" style="font-size:36px;color:#aaa;opacity:.5;margin-bottom:10px"></i><p>Нет событий.</p>
        </div>

        <div id="tableWrap" style="display:none">
            <!-- Warning summary bar -->
            <div id="warnBar" style="display:none;background:#fff3e0;border:1px solid #ffcc02;border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:13px;color:#e65100">
                <i class="fa-solid fa-triangle-exclamation"></i> <span id="warnCount"></span> Warning-событий в этом namespace
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Тип</th>
                            <th>Причина</th>
                            <th>Объект</th>
                            <th>Kind</th>
                            <th>Сообщение</th>
                            <th title="Кол-во">×</th>
                            <th>Последний раз</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="app.js"></script>
<script>
let currentClusterId = null, currentNamespace = null, cache = [];

document.addEventListener('DOMContentLoaded', async () => {
    await loadClusters();
    document.getElementById('clusterSelect').addEventListener('change', onClusterChange);
    document.getElementById('namespaceSelect').addEventListener('change', onNsChange);
    document.getElementById('typeFilter').addEventListener('change', renderTable);
    document.getElementById('kindFilter').addEventListener('change', renderTable);
    document.getElementById('filter').addEventListener('input', renderTable);
    document.getElementById('refreshBtn').addEventListener('click', load);
});

async function loadClusters() {
    try {
        const data = await api.get('/kubernetes/clusters');
        const sel = document.getElementById('clusterSelect');
        if (!data.clusters || !data.clusters.length) { showState('notConfigured'); return; }
        data.clusters.forEach(c => {
            const o = document.createElement('option'); o.value = c.id; o.textContent = c.display_name || c.id; sel.appendChild(o);
        });
        showState('selectCluster');
    } catch { showState('notConfigured'); }
}

async function onClusterChange() {
    currentClusterId = document.getElementById('clusterSelect').value || null;
    const nsSel = document.getElementById('namespaceSelect');
    nsSel.innerHTML = '<option value="">— Namespace —</option>'; nsSel.disabled = true; hide();
    if (!currentClusterId) { showState('selectCluster'); return; }
    showState('loading');
    try {
        const data = await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces?limit=500`);
        (data.items || []).forEach(ns => {
            const o = document.createElement('option'); o.value = ns.name; o.textContent = ns.name; nsSel.appendChild(o);
        });
        nsSel.disabled = false; showState('selectCluster');
    } catch (e) { showState('error', e.message); }
}

async function onNsChange() {
    currentNamespace = document.getElementById('namespaceSelect').value || null;
    if (!currentNamespace) { hide(); showState('selectCluster'); return; }
    await load();
}

async function load() {
    if (!currentClusterId || !currentNamespace) return;
    showState('loading'); hide();
    const typeFilter = document.getElementById('typeFilter').value;
    const kindFilter = document.getElementById('kindFilter').value;
    let url = `/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/events?limit=200`;
    if (typeFilter) url += `&event_type=${enc(typeFilter)}`;
    if (kindFilter) url += `&object_kind=${enc(kindFilter)}`;
    try {
        const data = await api.get(url);
        cache = data.items || [];
        // sort: Warning first, then by last_time desc
        cache.sort((a, b) => {
            if (a.type_ !== b.type_) return a.type_ === 'Warning' ? -1 : 1;
            const ta = a.last_time || a.first_time || '';
            const tb = b.last_time || b.first_time || '';
            return tb.localeCompare(ta);
        });
        if (!cache.length) { showState('empty'); return; }
        renderTable(); show();
        ['filter','typeFilter','kindFilter'].forEach(id => document.getElementById(id).disabled = false);
        document.getElementById('refreshBtn').disabled = false;
    } catch (e) {
        const m = e.message || '';
        if (m.includes('FORBIDDEN') || m.includes('403')) showState('forbidden');
        else showState('error', m);
    }
}

function renderTable() {
    const f = (document.getElementById('filter').value || '').toLowerCase();
    const tf = document.getElementById('typeFilter').value;
    const kf = document.getElementById('kindFilter').value;

    const rows = cache.filter(e => {
        if (tf && e.type_ !== tf) return false;
        if (kf && e.involved_object_kind !== kf) return false;
        if (f && !e.involved_object_name.toLowerCase().includes(f) && !e.reason.toLowerCase().includes(f) && !e.message.toLowerCase().includes(f)) return false;
        return true;
    });

    // Warning bar
    const warnCount = rows.filter(e => e.type_ === 'Warning').length;
    const warnBar = document.getElementById('warnBar');
    if (warnCount > 0) {
        warnBar.style.display = '';
        document.getElementById('warnCount').textContent = warnCount;
    } else {
        warnBar.style.display = 'none';
    }

    const tbody = document.getElementById('tbody');
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-light)">Нет совпадений</td></tr>`;
        return;
    }
    tbody.innerHTML = rows.map(e => {
        const typeHtml = `<span class="event-type ${e.type_ === 'Warning' ? 'event-warning' : 'event-normal'}">
            ${e.type_ === 'Warning' ? '<i class="fa-solid fa-triangle-exclamation"></i>' : '<i class="fa-solid fa-circle-info"></i>'}
            ${escapeHtml(e.type_)}
        </span>`;
        const countHtml = `<span class="event-count ${e.count > 10 ? 'many' : ''}">${e.count}</span>`;
        const lastTime = e.last_time || e.first_time;
        const timeHtml = lastTime ? `<span style="font-size:11px;color:var(--text-light)">${formatDate(lastTime)}</span>` : '—';
        const msgTitle = escapeHtml(e.message);
        const msgShort = e.message.length > 80 ? e.message.substring(0, 77) + '…' : e.message;

        return `<tr style="${e.type_ === 'Warning' ? 'background:rgba(255,152,0,.04)' : ''}">
            <td>${typeHtml}</td>
            <td style="font-weight:500;font-size:12px">${escapeHtml(e.reason)}</td>
            <td style="font-size:12px;font-family:monospace">${escapeHtml(e.involved_object_name)}</td>
            <td><span class="kind-badge">${escapeHtml(e.involved_object_kind)}</span></td>
            <td><span class="event-msg" title="${msgTitle}">${escapeHtml(msgShort)}</span></td>
            <td>${countHtml}</td>
            <td>${timeHtml}</td>
        </tr>`;
    }).join('');
}

const enc = s => encodeURIComponent(s);
function showState(s, msg) {
    ['notConfigured','selectCluster','loading','forbidden','error','empty'].forEach(x => {
        document.getElementById('state' + x.charAt(0).toUpperCase() + x.slice(1)).style.display = 'none';
    });
    const el = document.getElementById('state' + s.charAt(0).toUpperCase() + s.slice(1));
    if (el) el.style.display = '';
    if (s === 'error' && msg) document.getElementById('stateErrorMsg').textContent = msg;
}
function show() { document.getElementById('tableWrap').style.display = ''; }
function hide() { document.getElementById('tableWrap').style.display = 'none'; }
</script>
</body>
</html>
