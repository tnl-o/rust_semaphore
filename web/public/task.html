<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи - Semaphore UI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-waiting  { background: #f0f0f0; color: #666; }
        .status-running  { background: #e3f2fd; color: #1976d2; }
        .status-success  { background: #c6f6d5; color: #276749; }
        .status-error    { background: #fed7d7; color: #c53030; }
        .status-failed   { background: #fed7d7; color: #c53030; }
        .status-cancelled{ background: #e0e0e0; color: #424242; }

        /* Task detail modal */
        .task-modal-body { display: flex; flex-direction: column; gap: 16px; }
        .task-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .task-meta-item { }
        .task-meta-label { font-size: 12px; color: var(--text-light); margin-bottom: 3px; }
        .task-meta-value { font-weight: 600; }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 400px;
            overflow-y: auto;
        }
        .log-line { margin-bottom: 3px; white-space: pre-wrap; word-break: break-all; }
        .log-info    { color: #d4d4d4; }
        .log-success { color: #4ec9b0; }
        .log-warning { color: #ce9178; }
        .log-error   { color: #f48771; }
        .log-debug   { color: #808080; }

        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #005057, #00897b);
            animation: indeterminate 1.5s infinite;
            width: 40%;
        }
        @keyframes indeterminate {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .task-row { cursor: pointer; }
        .task-row:hover td { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Задачи</h2>
            </div>

            <div class="main-body">
                <div class="page-header">
                    <h1>▶ История задач</h1>
                    <button class="btn btn-sm" onclick="loadTasks()">↺ Обновить</button>
                </div>

                <div id="tasks-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка задач...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task detail modal -->
    <div id="task-detail-modal" class="modal-overlay" style="display:none;" onclick="closeTaskDetail(event)">
        <div class="modal" style="max-width: 900px; width: 95vw;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="modal-title">Задача #—</h2>
                <div style="display:flex; gap:8px; align-items:center;">
                    <span id="modal-status-badge" class="status-badge"></span>
                    <button class="btn btn-sm" id="modal-confirm-btn" style="display:none; background:#276749; color:#fff;" onclick="confirmCurrentTask()">✓ Подтвердить</button>
                    <button class="btn btn-sm" id="modal-reject-btn" style="display:none; background:#c53030; color:#fff;" onclick="rejectCurrentTask()">✗ Отклонить</button>
                    <button class="btn btn-sm" id="modal-stop-btn" style="display:none; color:#c53030;" onclick="stopCurrentTask()">■ Остановить</button>
                    <button class="btn btn-sm" id="modal-rerun-btn" style="display:none;" onclick="rerunCurrentTask()" title="Повторить запуск">↺ Повторить</button>
                    <button class="btn btn-sm" onclick="downloadCurrentLog()">📥 Лог</button>
                    <button class="btn btn-sm" onclick="closeTaskDetailModal()">✕</button>
                </div>
            </div>
            <div class="task-modal-body">
                <div id="modal-progress" style="display:none;">
                    <div class="progress-bar"><div class="progress-bar-fill"></div></div>
                </div>
                <div class="task-meta-grid" id="modal-meta"></div>
                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <strong>Лог выполнения</strong>
                        <label style="font-size:12px; color:var(--text-light); cursor:pointer;">
                            <input type="checkbox" id="log-autoscroll" checked> Автопрокрутка
                        </label>
                    </div>
                    <div id="modal-log" class="log-container">
                        <div style="color:#666; text-align:center; padding:40px;">Загрузка...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        if (!projectId) { window.location.href = 'index.html'; }

        api.getProject(projectId).then(p => {
            $('#project-title').textContent = p.name + ' → Задачи';
            document.title = 'Задачи - ' + p.name;
        }).catch(() => {});

        // Templates cache for display
        let templatesCache = {};
        api.getTemplates(projectId).then(list => {
            list.forEach(t => { templatesCache[t.id] = t.name; });
        }).catch(() => {});

        loadTasks();
        // Auto-refresh every 10s if any task is running
        setInterval(() => {
            if (document.querySelector('.status-running, .status-waiting')) loadTasks();
        }, 10000);

        function loadTasks() {
            api.getTasks(projectId)
                .then(tasks => {
                    const container = $('#tasks-content');
                    if (!tasks || tasks.length === 0) {
                        ui.showEmpty(container, '▶', 'Нет задач', 'Запустите шаблон чтобы создать задачу');
                        return;
                    }
                    // Sort newest first
                    tasks.sort((a, b) => new Date(b.created) - new Date(a.created));
                    container.innerHTML = `
                        <table class="table">
                            <thead><tr>
                                <th>#</th>
                                <th>Шаблон</th>
                                <th>Пользователь</th>
                                <th>Статус</th>
                                <th>Создана</th>
                                <th>Длительность</th>
                                <th>Действия</th>
                            </tr></thead>
                            <tbody>
                                ${tasks.map(t => `
                                    <tr class="task-row" onclick="openTaskDetail(${t.id})">
                                        <td><strong>#${t.id}</strong></td>
                                        <td>
                                            <a href="template.html?id=${projectId}&tpl=${t.template_id}" onclick="event.stopPropagation();" style="text-decoration:none; color:var(--primary);">
                                                ${escapeHtml(templatesCache[t.template_id] || 'Шаблон #' + t.template_id)}
                                            </a>
                                        </td>
                                        <td>${escapeHtml(t.user_name || t.username || '—')}</td>
                                        <td><span class="status-badge status-${t.status}">${statusLabel(t.status)}</span></td>
                                        <td>${formatDate(t.created)}</td>
                                        <td>${calcDuration(t)}</td>
                                        <td onclick="event.stopPropagation()">
                                            <button class="btn btn-sm" onclick="openTaskDetail(${t.id})" title="Детали">🔍</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                })
                .catch(err => ui.showError($('#tasks-content'), err.message));
        }

        function statusLabel(s) {
            return { waiting: 'Ожидание', running: 'Выполняется', success: 'Успешно',
                     error: 'Ошибка', failed: 'Ошибка', cancelled: 'Отменено',
                     waiting_confirmation: 'Ожидает подтверждения' }[s] || s;
        }

        function calcDuration(task) {
            if (!task.start_time) return '—';
            const end  = task.end_time ? new Date(task.end_time) : new Date();
            const diff = Math.floor((end - new Date(task.start_time)) / 1000);
            if (diff < 60) return diff + 'с';
            return Math.floor(diff/60) + 'м ' + (diff%60) + 'с';
        }

        function formatTimeOnly(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // ---- Task detail modal ----
        let currentTaskId = null;
        let detailWs = null;
        let detailPollTimer = null;

        function openTaskDetail(taskId) {
            currentTaskId = taskId;
            $('#task-detail-modal').style.display = 'flex';
            $('#modal-log').innerHTML = '<div style="color:#666; text-align:center; padding:40px;">Загрузка...</div>';
            loadTaskDetail();
        }

        function closeTaskDetailModal() {
            $('#task-detail-modal').style.display = 'none';
            currentTaskId = null;
            stopDetailPolling();
            if (detailWs) { detailWs.close(); detailWs = null; }
        }

        function closeTaskDetail(e) {
            if (e.target === $('#task-detail-modal')) closeTaskDetailModal();
        }

        function loadTaskDetail() {
            if (!currentTaskId) return;
            api.getTask(projectId, currentTaskId).then(task => {
                renderTaskMeta(task);
                const running = task.status === 'running' || task.status === 'waiting' || task.status === 'starting';
                const confirming = task.status === 'waiting_confirmation';
                const finished = !running && !confirming;
                $('#modal-progress').style.display = (running || confirming) ? 'block' : 'none';
                $('#modal-stop-btn').style.display = running ? 'inline-block' : 'none';
                $('#modal-confirm-btn').style.display = confirming ? 'inline-block' : 'none';
                $('#modal-reject-btn').style.display = confirming ? 'inline-block' : 'none';
                const rerunBtn = $('#modal-rerun-btn');
                if (rerunBtn) {
                    rerunBtn.style.display = finished ? 'inline-block' : 'none';
                    rerunBtn.dataset.templateId = task.template_id;
                }

                if (running || confirming) {
                    connectDetailWs(currentTaskId);
                    startDetailPolling();
                } else {
                    stopDetailPolling();
                    loadTaskLog(currentTaskId);
                }
            }).catch(err => { $('#modal-meta').innerHTML = '<div class="alert alert-danger">' + escapeHtml(err.message) + '</div>'; });
        }

        function renderTaskMeta(task) {
            $('#modal-title').textContent = 'Задача #' + task.id;
            const badge = $('#modal-status-badge');
            badge.className = 'status-badge status-' + task.status;
            badge.textContent = statusLabel(task.status);

            const durStr = task.start_time ? calcDuration(task) : '—';
            const extra = [];
            if (task.git_branch) extra.push(`<div class="task-meta-item"><div class="task-meta-label">Ветка</div><div class="task-meta-value"><code>${escapeHtml(task.git_branch)}</code></div></div>`);
            if (task.inventory_id) extra.push(`<div class="task-meta-item"><div class="task-meta-label">Инвентарь</div><div class="task-meta-value">#${task.inventory_id}</div></div>`);
            if (task.environment_id) extra.push(`<div class="task-meta-item"><div class="task-meta-label">Окружение</div><div class="task-meta-value">#${task.environment_id}</div></div>`);
            if (task.arguments) extra.push(`<div class="task-meta-item" style="grid-column:1/-1"><div class="task-meta-label">Аргументы</div><div class="task-meta-value"><code style="font-size:12px; word-break:break-all;">${escapeHtml(task.arguments)}</code></div></div>`);
            if (task.commit_hash) extra.push(`<div class="task-meta-item"><div class="task-meta-label">Коммит</div><div class="task-meta-value"><code style="font-size:12px;">${escapeHtml(task.commit_hash.substring(0,8))}</code></div></div>`);
            if (task.version) extra.push(`<div class="task-meta-item"><div class="task-meta-label">Версия</div><div class="task-meta-value">${escapeHtml(task.version)}</div></div>`);

            $('#modal-meta').innerHTML = `
                <div class="task-meta-item">
                    <div class="task-meta-label">Шаблон</div>
                    <div class="task-meta-value">${escapeHtml(templatesCache[task.template_id] || 'Шаблон #' + task.template_id)}</div>
                </div>
                <div class="task-meta-item">
                    <div class="task-meta-label">Пользователь</div>
                    <div class="task-meta-value">${escapeHtml(task.user_name || task.username || '—')}</div>
                </div>
                <div class="task-meta-item">
                    <div class="task-meta-label">Создана</div>
                    <div class="task-meta-value">${formatDate(task.created)}</div>
                </div>
                ${task.start_time ? `<div class="task-meta-item">
                    <div class="task-meta-label">Начало</div>
                    <div class="task-meta-value">${formatDate(task.start_time)}</div>
                </div>` : ''}
                ${task.end_time ? `<div class="task-meta-item">
                    <div class="task-meta-label">Завершение</div>
                    <div class="task-meta-value">${formatDate(task.end_time)}</div>
                </div>` : ''}
                <div class="task-meta-item">
                    <div class="task-meta-label">Длительность</div>
                    <div class="task-meta-value">${durStr}</div>
                </div>
                ${extra.join('')}
            `;
        }

        function loadTaskLog(taskId) {
            api.getTaskOutput(projectId, taskId).then(output => {
                const container = $('#modal-log');
                if (!output || output.length === 0) {
                    container.innerHTML = '<div style="color:#666; text-align:center; padding:40px;">Лог пуст</div>';
                    return;
                }
                container.innerHTML = output.map(item => {
                    const line = typeof item === 'string' ? item : (item.output || '');
                    const ts = item.time ? '[' + formatTimeOnly(item.time) + '] ' : '';
                    const fullLine = ts + line;
                    return `<div class="log-line ${getLogClass(line)}">${escapeHtml(fullLine)}</div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            }).catch(err => {
                $('#modal-log').innerHTML = '<div style="color:#f48771; padding:16px;">Ошибка загрузки лога: ' + escapeHtml(err.message) + '</div>';
            });
        }

        function connectDetailWs(taskId) {
            if (detailWs) return;
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            const url = `${proto}://${location.host}/api/project/${projectId}/tasks/${taskId}/ws`;
            detailWs = new WebSocket(url);
            const container = $('#modal-log');
            if (container.innerHTML.includes('Загрузка')) container.innerHTML = '';

            detailWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'output' && msg.line !== undefined) {
                        appendLogLine(msg.line);
                    } else if (msg.type === 'done') {
                        detailWs.close(); detailWs = null;
                        stopDetailPolling();
                        loadTaskDetail();
                        loadTasks();
                    }
                } catch (e) {
                    appendLogLine(event.data);
                }
            };
            detailWs.onerror = () => { detailWs = null; startDetailPolling(); };
            detailWs.onclose = () => { detailWs = null; };
        }

        function appendLogLine(text) {
            const container = $('#modal-log');
            if (!container) return;
            const div = document.createElement('div');
            div.className = 'log-line ' + getLogClass(text);
            div.textContent = text;
            container.appendChild(div);
            if ($('#log-autoscroll') && $('#log-autoscroll').checked) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function startDetailPolling() {
            if (detailPollTimer) return;
            detailPollTimer = setInterval(() => {
                if (!currentTaskId) { stopDetailPolling(); return; }
                api.getTask(projectId, currentTaskId).then(task => {
                    renderTaskMeta(task);
                    const running = task.status === 'running' || task.status === 'waiting' || task.status === 'starting';
                    if (!running) {
                        stopDetailPolling();
                        $('#modal-progress').style.display = 'none';
                        $('#modal-stop-btn').style.display = 'none';
                        loadTaskLog(currentTaskId);
                        loadTasks();
                    }
                });
            }, 4000);
        }

        function stopDetailPolling() {
            if (detailPollTimer) { clearInterval(detailPollTimer); detailPollTimer = null; }
        }

        function stopCurrentTask() {
            if (!currentTaskId) return;
            api.stopTask(projectId, currentTaskId)
                .then(() => { ui.showAlert('Задача остановлена', 'info'); loadTaskDetail(); })
                .catch(err => ui.showAlert('Ошибка: ' + err.message, 'danger'));
        }

        function confirmCurrentTask() {
            if (!currentTaskId) return;
            api.confirmTask(projectId, currentTaskId)
                .then(() => { ui.showAlert('Задача подтверждена', 'success'); loadTaskDetail(); })
                .catch(err => ui.showAlert('Ошибка: ' + err.message, 'danger'));
        }

        function rejectCurrentTask() {
            if (!currentTaskId) return;
            api.rejectTask(projectId, currentTaskId)
                .then(() => { ui.showAlert('Задача отклонена', 'info'); loadTaskDetail(); })
                .catch(err => ui.showAlert('Ошибка: ' + err.message, 'danger'));
        }

        function rerunCurrentTask() {
            const btn = $('#modal-rerun-btn');
            const templateId = btn && btn.dataset.templateId;
            if (!templateId) return;
            
            // Открываем форму запуска с survey_vars
            openRunDialogWithSurveyVars(templateId);
        }

        // =====================================================================
        // Run Dialog with Survey Variables
        // =====================================================================

        function openRunDialogWithSurveyVars(templateId) {
            // Загружаем шаблон для получения survey_vars и allow_* флагов
            api.getTemplate(projectId, templateId)
                .then(tpl => {
                    const surveyVars = tpl?.survey_vars || [];
                    const taskParams = tpl?.task_params || {};
                    
                    const modal = document.createElement('div');
                    modal.className = 'modal-overlay';
                    modal.innerHTML = `
                        <div class="modal" style="max-width:550px;">
                            <div class="modal-header">
                                <h3>▶ Запуск задачи: ${escapeHtml(tpl.name)}</h3>
                                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                            </div>
                            <div class="modal-body">
                                <form id="run-task-form">
                                    ${surveyVars.length > 0 ? `
                                        <div style="margin-bottom:16px;">
                                            <strong style="font-size:13px; color:var(--text-light); text-transform:uppercase; letter-spacing:.5px;">Параметры запуска</strong>
                                        </div>
                                        ${surveyVars.map(sv => `
                                            <div class="form-group">
                                                <label for="survey-${escapeHtml(sv.name)}">${escapeHtml(sv.title || sv.name)}${sv.required ? ' *' : ''}</label>
                                                ${sv.type === 'enum' && sv.enum_values ? `
                                                    <select id="survey-${escapeHtml(sv.name)}" class="form-control" ${sv.required ? 'required' : ''}>
                                                        <option value="">— выберите —</option>
                                                        ${sv.enum_values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('')}
                                                    </select>
                                                ` : sv.type === 'secret' ? `
                                                    <input type="password" id="survey-${escapeHtml(sv.name)}" class="form-control" ${sv.required ? 'required' : ''} placeholder="••••••••">
                                                ` : `
                                                    <input type="${sv.type === 'int' ? 'number' : 'text'}" id="survey-${escapeHtml(sv.name)}" class="form-control" ${sv.required ? 'required' : ''} placeholder="${sv.description || ''}">
                                                `}
                                                ${sv.description ? `<small style="color:var(--text-light);">${escapeHtml(sv.description)}</small>` : ''}
                                            </div>
                                        `).join('')}
                                    ` : '<p style="color:var(--text-light);">Для этого шаблона не заданы переменные опроса.</p>'}
                                    
                                    ${taskParams.allow_override_branch_in_task ? `
                                        <div class="form-group">
                                            <label for="git-branch">Git Branch</label>
                                            <input type="text" id="git-branch" class="form-control" value="${escapeHtml(tpl.git_branch || 'main')}" placeholder="main">
                                            <small style="color:var(--text-light);">Ветка Git для запуска (по умолчанию: ${escapeHtml(tpl.git_branch || 'main')})</small>
                                        </div>
                                    ` : ''}
                                    
                                    ${taskParams.allow_override_args_in_task ? `
                                        <div class="form-group">
                                            <label for="cli-args">CLI Arguments</label>
                                            <input type="text" id="cli-args" class="form-control" placeholder="--extra-vars='...'">
                                            <small style="color:var(--text-light);">Дополнительные аргументы командной строки</small>
                                        </div>
                                    ` : ''}
                                    
                                    ${taskParams.allow_debug ? `
                                        <div class="form-group">
                                            <label for="debug-level">Debug Level (Ansible)</label>
                                            <select id="debug-level" class="form-control">
                                                <option value="0">Off</option>
                                                <option value="1">1 - Minimal</option>
                                                <option value="2">2 - Basic</option>
                                                <option value="3" selected>3 - Default</option>
                                                <option value="4">4 - Verbose</option>
                                                <option value="5">5 - Debug</option>
                                            </select>
                                        </div>
                                    ` : ''}
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn" onclick="this.closest('.modal-overlay').remove()">Отмена</button>
                                <button type="submit" form="run-task-form" class="btn btn-primary">▶ Запустить</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);

                    $('#run-task-form').addEventListener('submit', (e) => {
                        e.preventDefault();
                        
                        // Собираем survey_vars значения
                        const extraVars = {};
                        surveyVars.forEach(sv => {
                            const el = $('#survey-' + sv.name.replace(/[^a-zA-Z0-9_-]/g, '-'));
                            if (el && el.value) {
                                extraVars[sv.name] = sv.type === 'int' ? parseInt(el.value) : el.value;
                            } else if (sv.required) {
                                ui.showAlert('Заполните обязательное поле: ' + (sv.title || sv.name), 'warning');
                                return;
                            }
                        });
                        
                        const taskData = {
                            template_id: templateId,
                            debug: taskParams.allow_debug ? $('#debug-level') && parseInt($('#debug-level').value) > 0 : false,
                            dry_run: false,
                            diff: false
                        };
                        
                        if (Object.keys(extraVars).length > 0) {
                            taskData.extra_vars = extraVars;
                        }
                        
                        if (taskParams.allow_override_branch_in_task && $('#git-branch')) {
                            taskData.git_branch = $('#git-branch').value.trim() || tpl.git_branch;
                        }
                        
                        if (taskParams.allow_override_args_in_task && $('#cli-args')) {
                            taskData.arguments = $('#cli-args').value.trim() || null;
                        }
                        
                        // Создаём задачу
                        api.createTask(projectId, taskData)
                            .then(newTask => {
                                ui.showAlert('Задача создана', 'success');
                                modal.remove();
                                // Открываем детальную информацию о задаче
                                openTaskDetail(newTask.id);
                            })
                            .catch(err => ui.showAlert('Ошибка: ' + err.message, 'danger'));
                    });

                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) modal.remove();
                    });
                })
                .catch(err => {
                    ui.showAlert('Ошибка загрузки шаблона: ' + err.message, 'danger');
                });
        }

        function downloadCurrentLog() {
            if (!currentTaskId) return;
            api.getTaskOutput(projectId, currentTaskId).then(output => {
                const lines = output.map(item => {
                    const line = typeof item === 'string' ? item : (item.output || '');
                    const ts = item.time ? '[' + formatTimeOnly(item.time) + '] ' : '';
                    return ts + line;
                });
                const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'task-' + currentTaskId + '.log';
                a.click();
                URL.revokeObjectURL(url);
            }).catch(err => ui.showAlert('Ошибка: ' + err.message, 'danger'));
        }

        function getLogClass(line) {
            const lower = (line || '').toLowerCase();
            if (lower.includes('ok=') || lower.includes('changed=') || lower.includes('successfully')) return 'log-success';
            if (lower.includes('failed=') || lower.includes('fatal') || lower.includes('error')) return 'log-error';
            if (lower.includes('warning') || lower.includes('warn')) return 'log-warning';
            if (lower.includes('debug')) return 'log-debug';
            return 'log-info';
        }

        // Open specific task from URL param ?task=N
        const openTaskParam = urlParams.get('task');
        if (openTaskParam) {
            setTimeout(() => openTaskDetail(parseInt(openTaskParam)), 300);
        }
    </script>
</body>
</html>
