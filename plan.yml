# ============================================================================
# МАШИНОЧИТАЕМАЯ ИНФОРМАЦИЯ О ПРОЕКТЕ
# ============================================================================

project_metadata:
  name: "Velum"
  description: "Система управления и автоматизации DevOps задач с открытым исходным кодом"
  version: "2.5.1"
  license: "MIT"
  languages:
    - "Rust"
    - "JavaScript"
  repositories:
    main: "https://github.com/tnl-o/velum"
    fork: "https://github.com/alexandervashurin/semaphore"
  contacts:
    author: "Alexander Vashurin"
    email: "a.bobnyukhov@gmail.com"

project_structure:
  backend:
    path: "rust/"
    language: "Rust"
    lines_of_code: 25000
    framework: "Axum 0.8"
    runtime: "Tokio 1"
    database: "SQLx 0.8 + PostgreSQL"
    kubernetes_client: "kube 0.98 + k8s-openapi 0.24"
    test_count: 710
    test_coverage: 0.67
    subdirs:
      - path: "rust/src/api/"
        description: "HTTP handlers (200+ функций)"
      - path: "rust/src/api/handlers/kubernetes/"
        description: "K8s API (12 модулей, ~8000 строк)"
      - path: "rust/src/api/handlers/mcp/"
        description: "MCP server (60 инструментов)"
      - path: "rust/src/api/middleware/"
        description: "Auth, rate limiting, CORS"
      - path: "rust/src/api/routes.rs"
        description: "908 строк, 12 модулей"
      - path: "rust/src/models/"
        description: "Модели данных"
      - path: "rust/src/db/"
        description: "SQLx PostgreSQL"
      - path: "rust/src/services/"
        description: "Task runner, scheduler, backup"
      - path: "rust/src/kubernetes/"
        description: "K8s client, Helm, Jobs"
      - path: "rust/src/config/"
        description: "Конфигурация (HA, LDAP, OIDC)"
      - path: "rust/src/utils/"
        description: "Encryption, mailer, SSH"
      - path: "rust/tests/"
        description: "710+ тестов"

  frontend:
    path: "web/public/"
    language: "Vanilla JavaScript"
    lines_of_code: 5000
    framework: "Vanilla JS + Material Design"
    pages_total: 48
    pages_base: 28
    pages_kubernetes: 20
    subdirs:
      - path: "web/public/*.html"
        description: "48 страниц (28 базовых + 20 Kubernetes)"
      - path: "web/public/app.js"
        description: "API client, sidebar"
      - path: "web/public/styles.css"
        description: "Material Design CSS"

  mcp:
    path: "mcp/"
    description: "Embedded MCP сервер"
    tools_count: 60

  database:
    path: "db/postgres/"
    description: "Миграции PostgreSQL"

  deploy:
    path: "deploy/"
    description: "Docker Compose (demo/dev/prod)"
    variants:
      - "demo"
      - "dev"
      - "prod"

  docs:
    path: "docs/"
    subdirs:
      - path: "docs/technical/"
        description: "API, Auth, Config, Security"
      - path: "docs/guides/"
        description: "Setup, Testing, Demo"
      - path: "docs/releases/"
        description: "Release notes"
      - path: "docs/future/"
        description: "Roadmap, планы (12 файлов)"
      - path: "docs/archive/"
        description: "Исторические отчёты"

  scripts:
    path: "scripts/"
    description: "Утилиты, SQL seeds"

  key_files:
    - path: "MASTER_PLAN.md"
      lines: 3040
      description: "Основной план"
    - path: "MASTER_PLAN_V3.md"
      lines: 930
      description: "Feature parity"
    - path: "MASTER_PLAN_KUBERNETES.md"
      lines: 1725
      description: "K8s UI план"
    - path: "PHASE_01_*.md .. PHASE_10.md"
      description: "Детальные фазы"
    - path: "CHANGELOG.md"
      lines: 913
      description: "История версий"
    - path: "README.md"
      description: "Актуальная документация"
    - path: "DEPLOY.md"
      description: "Руководство по развёртыванию"
    - path: "api-docs.yml"
      lines: 2773
      description: "OpenAPI 2.0"

api_endpoints:
  rest_total: 75
  kubernetes_total: 60
  graphql: true
  websocket: true

features:
  implemented:
    - "Web Framework: Axum 0.8 + Tokio"
    - "Database Layer: SQLx 0.8, PostgreSQL только"
    - "Auth: JWT, bcrypt, TOTP 2FA, LDAP, OIDC"
    - "Task Runner: Ansible, Terraform, Bash, PowerShell"
    - "Scheduler: Cron-расписания"
    - "WebSocket: Стриминг логов"
    - "Kubernetes Client: kube 0.98, k8s-openapi 0.24 (v1_30)"
    - "Helm Integration: Install/upgrade/rollback"
    - "MCP Server: 60 инструментов, встроен в Velum"
    - "GraphQL API: async-graphql 7.0"
    - "Prometheus Metrics: 18+ метрик"
    - "Rate Limiting: Реализован"
    - "Audit Logging: С экспортом CSV"
    - "Multi-Tenancy: Организации с квотами"
    - "HA Cluster: Redis backend, health checks"
  partial:
    - "Telegram Bot: Заглушка (teloxide)"
    - "SSH Key Installation: 5 стабов"
    - "Exporter/Importer: async/sync конфликт"
    - "Session Blacklist: Не реализован"
    - "gRPC API: Только документация"

