project: velum
as_of: 2026-04-01
goal: "Довести проект до production-ready и выпустить v1.0.0"
status_summary:
  feature_parity: "~97%"
  kubernetes_ui: "~92%"
  production_release_readiness: "~95%"
principles:
  - "Сначала закрыть блокеры релиза, потом nice-to-have"
  - "Каждая задача должна завершаться проверкой"
  - "Не смешивать feature work и release work в одном PR без причины"
  - "Безопасность прежде всего: уязвимости закрываются немедленно"

release_blockers:
  - id: RB-01
    title: "Полный green test run"
  - id: RB-02
    title: "E2E проверка deploy в Docker и Kubernetes"
  - id: RB-03
    title: "Актуальный OpenAPI"
  - id: RB-04
    title: "Финальная документация README/DEPLOY/CHANGELOG"
  - id: RB-05
    title: "Релиз v1.0.0"
  - id: RB-06
    title: "Безопасность: уязвимые зависимости"
  - id: RB-07
    title: "Критические TODO/FIXME в коде"

