build_commands:
  test: "cargo test"
  clippy: "cargo clippy -- -D warnings"
  build: "cargo build --release"
  audit: "cargo audit"
  doc: "cargo doc --no-deps"
  run: "cargo run -- server --host 0.0.0.0 --port 3000"

docker_commands:
  demo: "docker compose -f docker-compose.demo.yml up --build -d"
  dev: "docker compose -f docker-compose.dev.yml up --build -d"
  prod: "docker compose -f docker-compose.prod.yml up --build -d"
  k8s: "kubectl apply -f deploy/kubernetes/"

urls:
  demo: "http://localhost:8088"
  dev: "http://localhost:3000"
  prod: "http://localhost"
  api_health: "/api/health"
  api_docs: "/swagger"
  login: "/login"

credentials:
  demo:
    username: "admin"
    password: "admin123"
  dev:
    username: "admin"
    password: "admin123"

environment_variables:
  required:
    - "VELUM_DB_DIALECT"
    - "VELUM_DB_URL"
    - "VELUM_WEB_PATH"
    - "VELUM_JWT_SECRET"
    - "VELUM_ADMIN"
    - "VELUM_ADMIN_PASSWORD"
  optional:
    - "VELUM_LDAP_*"
    - "VELUM_OIDC_*"
    - "RUST_LOG"
    - "VELUM_HA_REDIS_HOST"
    - "VELUM_HA_REDIS_PORT"

ci_cd:
  provider: "GitHub Actions"
  workflows:
    - "rust.yml"
    - "coverage.yml"
    - "release.yml"
  jobs:
    - "build"
    - "test"
    - "clippy"
    - "audit"
    - "coverage"
    - "release"

metrics:
  lines_of_code_rust: 25000
  lines_of_code_js: 5000
  test_count: 710
  test_coverage: 0.67
  api_endpoints: 135
  kubernetes_pages: 33
  mcp_tools: 60
  docker_image_size_mb: 200
  target_docker_image_size_mb: 50

quick_start:
  demo:
    - "docker compose -f docker-compose.demo.yml up"
    - "Открыть http://localhost:8088"
    - "Логин: admin / admin123"
  dev:
    - "./velum.sh init dev"
    - "./velum.sh start dev"
    - "Открыть http://localhost:3000"
  prod:
    - "См. DEPLOY.md"

