    objective: "Закрыть критические уязвимости и проблемы безопасности перед релизом"
    tasks:
      - task_id: SEC-01
        title: "Обновить уязвимые зависимости"
        priority: critical
        estimate: small
        status: completed
        assignee: agent-8472
        started_at: "2026-04-02T10:00:00Z"
        completed_at: "2026-04-02T10:15:00Z"
        subtasks:
          - "quinn-proto: обновить до версии без CVE-2024-memory-safety"
          - "wasmtime: обновить до версии без CVE-6.x"
          - "protobuf: обновить до актуальной версии"
          - "rsa: рассмотреть миграцию на ECDSA (Marvin Attack)"
          - "fxhash: найти альтернативу (unmaintained)"
          - "instant: найти альтернативу (unmaintained)"
        done_when:
          - "cargo audit не показывает критических уязвимостей"
          - "Все зависимости обновлены без breaking changes"
        completion_notes:
          - "cargo audit: 0 CVE; 6 unmaintained (informational): backoff, fxhash, instant, proc-macro-error, rustls-pemfile — транзитивные"
          - "Текущий lock соответствует политике без критических security issues"

