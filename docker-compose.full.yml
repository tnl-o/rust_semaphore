version: '3.8'

# ============================================================================
# Docker Compose для полного развёртывания Velum
# Все сервисы в Docker: Frontend + PostgreSQL + Backend
# ============================================================================

services:
  # PostgreSQL - база данных
  db:
    image: postgres:15-alpine
    container_name: velum-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: velum
      POSTGRES_USER: velum
      POSTGRES_PASSWORD: velum_pass
    volumes:
      - velum_postgres_data:/var/lib/postgresql/data
      - ./db/postgres/init-demo.sql:/docker-entrypoint-initdb.d/init-demo.sql:ro
      - ./db/postgres/init-pghba.sh:/docker-entrypoint-initdb.d/init-pghba.sh:ro
    networks:
      - velum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velum -d velum"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend - Rust сервер
  backend:
    build:
      context: ./rust
      dockerfile: Dockerfile
    container_name: velum-backend
    restart: unless-stopped
    environment:
      VELUM_DB_DIALECT: postgres
      VELUM_DB_URL: postgres://velum:velum_pass@db:5432/velum
      VELUM_WEB_PATH: /app/web/public
      VELUM_TMP_PATH: /tmp/velum
      VELUM_TCP_ADDRESS: 0.0.0.0:3000
      RUST_LOG: info
    volumes:
      - ./web/public:/app/web/public:ro
      - velum_tmp:/tmp/velum
    ports:
      - "3000:3000"
    networks:
      - velum-network
    depends_on:
      db:
        condition: service_healthy
    command: ["./velum", "server", "--host", "0.0.0.0", "--port", "3000"]

  # Frontend - Nginx для раздачи статики
  frontend:
    image: nginx:alpine
    container_name: velum-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./web/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - velum-network
    depends_on:
      - backend

networks:
  velum-network:
    driver: bridge

volumes:
  velum_postgres_data:
    driver: local
  velum_tmp:
    driver: local
