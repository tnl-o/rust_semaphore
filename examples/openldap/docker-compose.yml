version: '3.8'

services:
  ldap:
    image: osixia/openldap:1.5.0
#    container_name: openldap
    environment:
      LDAP_ORGANISATION: "Example Inc."
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  ldap_admin:
    image: osixia/phpldapadmin:0.9.0
#    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
    ports:
      - "6443:443"
    depends_on:
      - ldap

  velum:
    image: velum/velum:latest
#    container_name: velum
    environment:
      VELUM_DB_DIALECT: "bolt"
      VELUM_ADMIN_PASSWORD: "changeme"
      VELUM_ADMIN_NAME: "admin"
      VELUM_ADMIN_EMAIL: "admin@example.org"
      VELUM_LDAP_ACTIVATED: "yes"
      VELUM_LDAP_SERVER: "ldap:389"
      VELUM_LDAP_SEARCH_DN: "dc=example,dc=org"
      VELUM_LDAP_BIND_DN: "cn=admin,dc=example,dc=org"
      VELUM_LDAP_BIND_PASSWORD: "admin"
      VELUM_LDAP_SEARCH_FILTER: "(&(objectClass=inetOrgPerson)(uid=%s))"
      VELUM_NON_ADMIN_CAN_CREATE_PROJECT: "yes"
    ports:
      - "3000:3000"
    volumes:
      - velum_data:/var/lib/velum
    depends_on:
      - ldap

volumes:
  ldap_data:
  ldap_config:
  velum_data: