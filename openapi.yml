openapi: 3.0.3
info:
  title: Velum API
  description: |
    REST API для управления Velum - системой автоматизации DevOps процессов.
    
    ## Аутентификация
    Все запросы к API требуют аутентификации через JWT токен.
    Токен передаётся в заголовке `Authorization: Bearer <token>`.
    
    ## Базовый URL
    - Development: `http://localhost:3000/api`
    - Production: `https://your-domain.com/api`
  version: 1.0.0
  contact:
    name: Velum
    url: https://github.com/alexandervashurin/semaphore
    email: alexandervashurin@yandex.ru

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://localhost:3000/api
    description: Production server

tags:
  - name: Authentication
    description: Аутентификация и авторизация
  - name: Users
    description: Управление пользователями
  - name: Projects
    description: Управление проектами
  - name: Templates
    description: Шаблоны задач
  - name: Tasks
    description: Задачи и их выполнение
  - name: Inventory
    description: Инвентари хостов
  - name: Repositories
    description: Git репозитории
  - name: Environments
    description: Окружения и переменные
  - name: Keys
    description: Ключи доступа (SSH, Login/Password)
  - name: Schedules
    description: Расписания задач
  - name: Webhooks
    description: Webhook уведомления
  - name: Audit Log
    description: Журнал аудита
  - name: Analytics
    description: Аналитика и метрики
  - name: Health
    description: Liveness/readiness и диагностика (часть путей без префикса /api — см. servers у операций)
  - name: Kubernetes
    description: Kubernetes ресурсы и операции кластера
  - name: Kubernetes WebSocket
    description: WebSocket — exec, port-forward, поток Events (namespace и cluster-wide)

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe (Kubernetes)
      description: |
        HTTP liveness: процесс отвечает. Путь от корня приложения (не под `/api`).
      operationId: healthz
      servers:
        - url: http://localhost:3000
          description: Корень приложения
      responses:
        '200':
          description: Процесс жив

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe (БД и зависимости)
      description: |
        `200` — БД доступна; `503` — не готов принимать трафик. Путь от корня приложения.
      operationId: readyz
      servers:
        - url: http://localhost:3000
          description: Корень приложения
      responses:
        '200':
          description: Готов
        '503':
          description: Не готов

  /health:
    get:
      tags: [Health]
      summary: Общий health (под базовым /api)
      operationId: healthApiRoot
      responses:
        '200':
          description: OK

  /health/live:
    get:
      tags: [Health]
      summary: Live probe (без проверки БД)
      operationId: healthLive
      responses:
        '200':
          description: OK

  /health/ready:
    get:
      tags: [Health]
      summary: Ready probe (проверка БД)
      operationId: healthReadyApi
      responses:
        '200':
          description: Готов
        '503':
          description: Не готов

  /health/full:
    get:
      tags: [Health]
      summary: Расширенный отчёт о состоянии
      operationId: healthFull
      responses:
        '200':
          description: OK

  /auth/login:
    post:
      tags: [Authentication]
      summary: Вход в систему
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          headers:
            Set-Cookie:
              schema:
                type: string
                example: token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Выход из системы
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успешный выход

  /auth/verify:
    post:
      tags: [Authentication]
      summary: Проверка сессии
      operationId: verifySession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Сессия действительна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users:
    get:
      tags: [Users]
      summary: Получить список пользователей
      operationId: getUsers
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /projects:
    get:
      tags: [Projects]
      summary: Получить список проектов
      operationId: getProjects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список проектов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Создать проект
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProject'
      responses:
        '201':
          description: Проект создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{project_id}/templates:
    get:
      tags: [Templates]
      summary: Получить шаблоны проекта
      operationId: getTemplates
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список шаблонов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'
    post:
      tags: [Templates]
      summary: Создать шаблон
      operationId: createTemplate
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplate'
      responses:
        '201':
          description: Шаблон создан

  /projects/{project_id}/tasks:
    get:
      tags: [Tasks]
      summary: Получить задачи проекта
      operationId: getTasks
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: template_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [waiting, running, success, failed]
      responses:
        '200':
          description: Список задач
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      tags: [Tasks]
      summary: Создать задачу
      operationId: createTask
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTask'
      responses:
        '201':
          description: Задача создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /projects/{project_id}/webhooks:
    get:
      tags: [Webhooks]
      summary: Получить webhook проекта
      operationId: getWebhooks
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: active
          in: query
          schema:
            type: boolean
        - name: type
          in: query
          schema:
            type: string
            enum: [generic, slack, teams, discord, telegram, custom]
      responses:
        '200':
          description: Список webhook
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
    post:
      tags: [Webhooks]
      summary: Создать webhook
      operationId: createWebhook
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhook'
      responses:
        '201':
          description: Webhook создан

  /projects/{project_id}/webhooks/{webhook_id}/test:
    post:
      tags: [Webhooks]
      summary: Тестировать webhook
      operationId: testWebhook
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: webhook_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Результат теста
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestWebhookResponse'

  /audit-log:
    get:
      tags: [Audit Log]
      summary: Получить записи audit log
      operationId: getAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          schema:
            type: integer
        - name: user_id
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            enum: [info, warning, error, critical]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Записи audit log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'

  /analytics/stats:
    get:
      tags: [Analytics]
      summary: Получить статистику проекта
      operationId: getAnalyticsStats
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [last_week, last_month, last_quarter, last_year]
      responses:
        '200':
          description: Статистика проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsStats'

  /kubernetes/namespaces/{namespace}/pods:
    get:
      tags: [Kubernetes]
      summary: Список Pod в namespace
      operationId: listPods
      security:
        - bearerAuth: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Список pod
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/K8sPodSummary'

  /kubernetes/namespaces/{namespace}/deployments:
    get:
      tags: [Kubernetes]
      summary: Список Deployment в namespace
      operationId: listDeployments
      security:
        - bearerAuth: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Список deployment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/K8sDeploymentSummary'

  /kubernetes/clusters/{cluster_id}/namespaces/{namespace}/pods/{name}/exec:
    get:
      tags: [Kubernetes WebSocket]
      summary: Pod exec terminal (WebSocket)
      description: |
        WebSocket endpoint для интерактивного shell в Pod.
        Клиент открывает WS соединение и отправляет stdin как text/binary frames.
      operationId: podExecWs
      security:
        - bearerAuth: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: command
          in: query
          schema:
            type: string
            default: /bin/sh
        - name: container
          in: query
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols (WebSocket upgraded)

  /kubernetes/clusters/{cluster_id}/namespaces/{namespace}/pods/{name}/portforward:
    get:
      tags: [Kubernetes WebSocket]
      summary: Pod port-forward tunnel (WebSocket)
      description: |
        WebSocket endpoint для двунаправленного туннеля к TCP-порту Pod.
      operationId: podPortForwardWs
      security:
        - bearerAuth: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: port
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 65535
      responses:
        '101':
          description: Switching Protocols (WebSocket upgraded)

  /kubernetes/events/stream:
    get:
      tags: [Kubernetes WebSocket]
      summary: Поток событий кластера (все namespace, WebSocket)
      description: |
        Cluster-wide watch событий Kubernetes. После upgrade клиент получает JSON-сообщения
        (`Event`, `connected`, `error`, `heartbeat`). Query `types` — фильтр по типам, например `Normal,Warning`.
      operationId: k8sClusterEventsStreamWs
      security:
        - bearerAuth: []
      parameters:
        - name: types
          in: query
          required: false
          schema:
            type: string
          description: "Через запятую, например Normal,Warning"
      responses:
        '101':
          description: Switching Protocols (WebSocket upgraded)

  /kubernetes/namespaces/{namespace}/events/stream:
    get:
      tags: [Kubernetes WebSocket]
      summary: Поток событий Kubernetes в namespace (WebSocket)
      description: |
        Watch событий в одном namespace. Query `types` — опциональный фильтр.
      operationId: k8sNamespaceEventsStreamWs
      security:
        - bearerAuth: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: types
          in: query
          required: false
          schema:
            type: string
          description: "Через запятую, например Normal,Warning"
      responses:
        '101':
          description: Switching Protocols (WebSocket upgraded)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: secret123
        totp:
          type: string
          description: TOTP код (если включён 2FA)
          example: "123456"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: string
        admin:
          type: boolean
        created:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created:
          type: string
          format: date-time

    CreateProject:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    Template:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        playbook:
          type: string
        environment_id:
          type: integer
        inventory_id:
          type: integer
        repository_id:
          type: integer

    CreateTemplate:
      type: object
      required: [name, playbook]
      properties:
        name:
          type: string
        playbook:
          type: string
        environment_id:
          type: integer
        inventory_id:
          type: integer
        repository_id:
          type: integer

    Task:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        template_id:
          type: integer
        status:
          type: string
          enum: [waiting, running, success, failed]
        created:
          type: string
          format: date-time
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time

    CreateTask:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: integer
        debug:
          type: boolean
          default: false
        dry_run:
          type: boolean
          default: false

    Webhook:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [generic, slack, teams, discord, telegram, custom]
        url:
          type: string
        active:
          type: boolean
        events:
          type: array
          items:
            type: string
        created:
          type: string
          format: date-time

    CreateWebhook:
      type: object
      required: [name, type, url]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [generic, slack, teams, discord, telegram, custom]
        url:
          type: string
        secret:
          type: string
        active:
          type: boolean
          default: true
        events:
          type: array
          items:
            type: string
        retry_count:
          type: integer
          default: 3
        timeout_secs:
          type: integer
          default: 30

    TestWebhookResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string

    AuditLogResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        user_id:
          type: integer
        username:
          type: string
        action:
          type: string
        object_type:
          type: string
        object_id:
          type: integer
        description:
          type: string
        level:
          type: string
        ip_address:
          type: string
        created:
          type: string
          format: date-time

    AnalyticsStats:
      type: object
      properties:
        total_tasks:
          type: integer
        success_tasks:
          type: integer
        failed_tasks:
          type: integer
        avg_duration:
          type: number
        templates_count:
          type: integer
        users_count:
          type: integer
        templates_by_type:
          type: object
          additionalProperties:
            type: integer
        top_users:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              tasks_count:
                type: integer

    K8sContainerSummary:
      type: object
      properties:
        name:
          type: string
        image:
          type: string
        ready:
          type: boolean
        state:
          type: string
        restarts:
          type: integer

    K8sPodSummary:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        uid:
          type: string
        phase:
          type: string
        node_name:
          type: string
          nullable: true
        pod_ip:
          type: string
          nullable: true
        containers:
          type: array
          items:
            $ref: '#/components/schemas/K8sContainerSummary'
        labels:
          type: object
          additionalProperties:
            type: string
        age:
          type: string
        ready:
          type: string
        restarts:
          type: integer

    K8sDeploymentCondition:
      type: object
      properties:
        type_:
          type: string
        status:
          type: string
        message:
          type: string
          nullable: true

    K8sDeploymentSummary:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        uid:
          type: string
        replicas:
          type: integer
        ready_replicas:
          type: integer
        available_replicas:
          type: integer
        updated_replicas:
          type: integer
        labels:
          type: object
          additionalProperties:
            type: string
        age:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/K8sDeploymentCondition'

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
