# ============================================================================
# Velum — Demo (одна команда, открыть http://localhost:8088)
# ============================================================================
# Запуск:
#   docker compose -f docker-compose.demo.yml up --build -d
#
# Учётные данные:  admin / admin123
# URL:             http://localhost:8088
#
# Сервисы:
#   postgres       — PostgreSQL 16
#   velum          — UI + API (порт 8088), включает ansible
#   ansible-target — SSH-цель для демо плейбуков (user: demo / demo123)
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: velum-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velum
      POSTGRES_PASSWORD: velum
      POSTGRES_DB: velum
    volumes:
      - velum_demo_pgdata:/var/lib/postgresql/data
    networks:
      - demo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velum"]
      interval: 5s
      timeout: 3s
      retries: 10

  velum:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: velum-demo
    restart: unless-stopped
    ports:
      - "8088:3000"
    environment:
      VELUM_DB_DIALECT: postgres
      VELUM_DB_URL: postgres://velum:velum@postgres:5432/velum
      VELUM_WEB_PATH: /app/web/public
      VELUM_ADMIN: admin
      VELUM_ADMIN_PASSWORD: admin123
      VELUM_ADMIN_NAME: Administrator
      VELUM_ADMIN_EMAIL: admin@velum.local
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      ansible-target:
        condition: service_started
    networks:
      - demo-net
      - host-bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ansible-target:
    image: debian:12-slim
    container_name: velum-demo-ansible-target
    hostname: ansible-target
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends openssh-server python3 sudo curl &&
        useradd -m -s /bin/bash demo &&
        echo 'demo:demo123' | chpasswd &&
        mkdir -p /home/demo/.ssh /run/sshd &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        echo 'PermitRootLogin no' >> /etc/ssh/sshd_config &&
        echo 'AllowUsers demo' >> /etc/ssh/sshd_config &&
        echo 'demo ALL=(ALL) NOPASSWD:ALL' >> /etc/sudoers &&
        ssh-keygen -A &&
        exec /usr/sbin/sshd -D -e
      "
    networks:
      - demo-net
    expose:
      - "22"

volumes:
  velum_demo_pgdata:
    driver: local

networks:
  demo-net:
    driver: bridge
  host-bridge:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
